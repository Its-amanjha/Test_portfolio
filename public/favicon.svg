<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Neobrutalist 'Akj' Monogram Logo (Spacious & Modern) -->
  
  <!-- Crossbar of A (drawn behind) -->
  <polygon points="146,280 210,280 210,315 133,315" fill="#FFDE4D" stroke="#000" stroke-width="16" stroke-linejoin="round" />
  
  <!-- Left slanted leg of A -->
  <polygon points="210,110 165,110 60,390 115,390 210,110" fill="#FFDE4D" stroke="#000" stroke-width="16" stroke-linejoin="round" />
  
  <!-- Vertical Stem (Right of A / Stem of K / Backbone of J) -->
  <rect x="210" y="110" width="45" height="300" fill="#FF2079" stroke="#000" stroke-width="16" stroke-linejoin="round" />
  
  <!-- Upper arm of K -->
  <polygon points="255,240 345,110 400,110 255,290" fill="#05F9E2" stroke="#000" stroke-width="16" stroke-linejoin="round" />
  
  <!-- Lower arm of K -->
  <polygon points="255,270 400,390 345,390 255,320" fill="#05F9E2" stroke="#000" stroke-width="16" stroke-linejoin="round" />

  <!-- Descender Hook of J (Extending the pink stem with a spacious sweep) -->
  <path d="M 210,410 L 255,410 L 255,430 C 255,475 220,475 190,475 C 150,475 130,455 130,420 L 180,420 C 180,430 190,430 195,430 C 205,430 210,425 210,410 Z" fill="#FF2079" stroke="#000" stroke-width="16" stroke-linejoin="round" />
</svg>